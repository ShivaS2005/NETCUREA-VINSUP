services:
  - type: web
    name: netcurea
    env: python
    buildCommand: ls -la && pip install -r requirements.txt && cd "Syed Medigrid/VINSUP HOSPITAL/frontend" && npm install && npm run build
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: VITE_API_URL
        value: /
    routes:
      # Backend API routes
      - type: rewrite
        source: /api/*
        destination: /api/*
      # Frontend static files
      - type: static
        source: /static/*
        destination: "Syed Medigrid/VINSUP HOSPITAL/frontend/dist"
      # Frontend SPA route - serve index.html for all other routes
      - type: rewrite
        source: /*
        destination: "Syed Medigrid/VINSUP HOSPITAL/frontend/dist/index.html"

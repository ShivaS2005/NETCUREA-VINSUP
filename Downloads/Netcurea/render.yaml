services:
  - type: web
    name: netcurea
    env: python
    buildCommand: |
      pip install Flask==2.3.2 flask-cors==4.0.0 "pymongo>=4.8.0" bcrypt==4.0.1 "reportlab>=4.2.2" openpyxl==3.1.2 joblib==1.3.2 "numpy<2.0.0" "scikit-learn>=1.5.0" "scipy>=1.11.0" requests==2.31.0 "google-generativeai>=0.8.2" python-dotenv==1.0.0
      cd "Syed Medigrid/VINSUP HOSPITAL/frontend"
      npm install
      npm run build
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: VITE_API_URL
        value: /
    routes:
      - type: rewrite
        source: /api/*
        destination: /api/*
      - type: static
        source: /static/*
        destination: "Syed Medigrid/VINSUP HOSPITAL/frontend/dist"
      - type: rewrite
        source: /*
        destination: "Syed Medigrid/VINSUP HOSPITAL/frontend/dist/index.html"

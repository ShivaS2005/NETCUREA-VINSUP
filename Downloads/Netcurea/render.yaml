services:
  - type: web
    name: netcurea
    env: python
    buildCommand: |
      pwd
      ls -la
      find . -name "requirements.txt" -type f
      pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: VITE_API_URL
        value: /
    routes:
      - type: rewrite
        source: /api/*
        destination: /api/*
      - type: static
        source: /static/*
        destination: "Syed Medigrid/VINSUP HOSPITAL/frontend/dist"
      - type: rewrite
        source: /*
        destination: "Syed Medigrid/VINSUP HOSPITAL/frontend/dist/index.html"
